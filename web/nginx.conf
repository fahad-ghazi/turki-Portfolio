server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ────────────────────────────────────────────────────────
  # Long-cache hashed assets (Vite emits content-hashed names
  # so they're safe to cache for 30 days)
  # ────────────────────────────────────────────────────────
  location ~* \.(?:js|mjs|css|woff2?|ttf|otf|svg|webp|avif|png|jpg|jpeg|gif|ico|mp4|webm)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # ────────────────────────────────────────────────────────
  # Security headers
  # ────────────────────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  # Force HTTPS for a year + include subdomains. Cloudflare also sends
  # this, but having it at origin protects against direct-IP probes.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # Tighten the cross-origin policy — block other origins from reading
  # window references / sniffing storage state.
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

  # Content Security Policy — adjust if you add a new third-party
  # tag. Comments inline so future-you knows why each line exists.
  #
  #   default-src 'self'             everything not listed below loads from origin only
  #   script-src 'self' 'unsafe-inline'
  #                                   'unsafe-inline' covers framer-motion's JIT styles
  #                                   and Vite's inlined runtime; switch to nonces if
  #                                   stricter audit pressure shows up
  #   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com
  #                                   Tailwind utility styles inline + the Cinzel/
  #                                   Cormorant Google Fonts stylesheet
  #   font-src 'self' https://fonts.gstatic.com data:
  #                                   Google Fonts woff2 + a few inline data URIs
  #   img-src 'self' data: blob: https:
  #                                   Local works/, data URIs, and any future remote
  #                                   asset (clearbit, og-fetch). Locks out http:.
  #   media-src 'self' blob:
  #                                   Local /videos/* + camera/share blobs
  #   connect-src 'self' https://api.turkistudio.ai
  #                                   API + own origin only — blocks third-party
  #                                   beacons that snuck in via dependencies
  #   frame-ancestors 'none'
  #                                   click-jack protection (works alongside X-Frame-Options)
  #   base-uri 'self'                 blocks <base> tag injection
  #   form-action 'self' mailto:      submit only to ourselves; allow mailto: links
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob:; connect-src 'self' https://api.turkistudio.ai; frame-ancestors 'none'; base-uri 'self'; form-action 'self' mailto:" always;

  # gzip (brotli is handled at the edge if any)
  gzip on;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
