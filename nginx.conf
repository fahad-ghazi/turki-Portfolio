server {
    listen 80;
    root /app;
    index index.html;

    # Fix .mjs MIME type — critical for Framer ES module bundles
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs cjs;
        application/json                      json;
        image/svg+xml                         svg svgz;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/webp                            webp;
        image/gif                             gif;
        image/x-icon                          ico;
        image/avif                            avif;
        font/woff                             woff;
        font/woff2                            woff2;
        font/ttf                              ttf;
        font/otf                              otf;
        video/mp4                             mp4;
        video/webm                            webm;
        application/manifest+json             webmanifest;
        text/plain                            txt;
        application/xml                       xml;
        application/octet-stream              bin;
    }

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(mjs|js|css|woff2|woff|ttf|png|jpg|jpeg|webp|svg|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # HTML — no cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
